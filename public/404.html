<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kendo Tournament</title>
    <script>
      // SPA fallback for GitHub Pages: rewrite any deep link into a hash-style
      // redirect that index.html can unwind, so react-router keeps working.
      (function () {
        var pathSegmentsToKeep = 1; // repo path segment (e.g. /kendo-tournament)
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
